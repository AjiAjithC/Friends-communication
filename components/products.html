<section class="py-12 bg-gray-50">
  <div class="container mx-auto px-4">

    <h2 class="text-3xl font-bold text-center mb-8">Our Products</h2>

    <div class="flex flex-col lg:flex-row gap-8">

      <!-- Left Sidebar (Desktop Only) -->
      <div class="lg:w-1/4 hidden lg:block">
        <div class="bg-white p-6 rounded-lg shadow-md">
          <h3 class="text-lg font-semibold mb-4">Categories</h3>

          <ul class="space-y-2">
            <li><button class="category-btn w-full text-left px-3 py-2 rounded hover:bg-blue-50 hover:text-blue-600" data-category="all">All Categories</button></li>
            <li><button class="category-btn w-full text-left px-3 py-2 rounded hover:bg-blue-50 hover:text-blue-600" data-category="TV">TV</button></li>
            <li><button class="category-btn w-full text-left px-3 py-2 rounded hover:bg-blue-50 hover:text-blue-600" data-category="Speakers">Speakers</button></li>
            <li><button class="category-btn w-full text-left px-3 py-2 rounded hover:bg-blue-50 hover:text-blue-600" data-category="Mobile">Mobile</button></li>
            <li><button class="category-btn w-full text-left px-3 py-2 rounded hover:bg-blue-50 hover:text-blue-600" data-category="Accessories">Accessories</button></li>
            <li><button class="category-btn w-full text-left px-3 py-2 rounded hover:bg-blue-50 hover:text-blue-600" data-category="Set Top Box">Set Top Box</button></li>
            <li><button class="category-btn w-full text-left px-3 py-2 rounded hover:bg-blue-50 hover:text-blue-600" data-category="Home Theater">Home Theater</button></li>
          </ul>

        </div>
      </div>


      <!-- Right Side -->
      <div class="lg:w-3/4">

        <!-- Mobile Dropdown -->
        <div class="lg:hidden mb-6">
          <select id="mobile-category"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">

            <option value="all">All Categories</option>
            <option value="TV">TV</option>
            <option value="Speakers">Speakers</option>
            <option value="Mobile">Mobile</option>
            <option value="Accessories">Accessories</option>
            <option value="Set Top Box">Set Top Box</option>
            <option value="Home Theater">Home Theater</option>

          </select>
        </div>

        <!-- Product Grid -->
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
          <!-- Products will be loaded here -->
        </div>

      </div>

    </div>
  </div>
</section>
